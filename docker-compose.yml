version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: talentheart_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: talentheart
    volumes:
      - mongo_data:/data/db
    networks:
      - talentheart_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Flask Backend
  flask:
    build: .
    container_name: talentheart_flask
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/talentheart
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FLASK_ENV=production
    volumes:
      - uploads_data:/app/backend/static/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - talentheart_net

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: talentheart_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - flask
    networks:
      - talentheart_net

volumes:
  mongo_data:
  uploads_data:

networks:
  talentheart_net:
    driver: bridge
